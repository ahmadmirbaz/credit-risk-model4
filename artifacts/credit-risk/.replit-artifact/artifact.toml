kind = "web"
previewPath = "/"
title = "Credit Risk Model"
version = "1.0.0"
id = "artifacts/credit-risk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19175
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/credit-risk run dev"

[services.env]
PORT = "19175"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/credit-risk", "run", "build"]
publicDir = "artifacts/credit-risk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
